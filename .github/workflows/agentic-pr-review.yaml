name: Agentic PR Review

# Runs when label `agentic-review` is applied, or when someone comments on a PR
# with @nitro-pr-review in the body (e.g. "@nitro-pr-review review this PR again …").
on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  agentic-review:
    name: PR Review
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'agentic-review') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@nitro-pr-review') && github.event.issue.pull_request && github.event.issue_comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    steps:
      - name: Skip ineligible PRs
        id: skip_gate
        if: |
          (github.event.pull_request.state || github.event.issue.state) != 'open'
        run: |
          echo "skip=true" >> "${GITHUB_OUTPUT}"
          echo "Skipping agentic review because the PR is not open"

      - name: Review PR
        timeout-minutes: 15
        if: steps.skip_gate.outputs.skip != 'true'
        uses: powerhome/github-actions-workflows/agentic-pr-review@7cf2f074c8247f1a3a07e0c759ef7008678de3f3 # main
        with:
          app-id: ${{ secrets.AGENTIC_REVIEW_GITHUB_APP_ID }}
          private-key: ${{ secrets.AGENTIC_REVIEW_GITHUB_APP_PRIVATE_KEY }}
          provider-api-key: ${{ secrets.AGENTIC_REVIEW_PROVIDER_API_KEY }}
          pull-request-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          # Intentionally pass the full comment through so reviewers can steer a rerun.
          additional-prompt: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
