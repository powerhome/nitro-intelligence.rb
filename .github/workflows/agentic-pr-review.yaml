name: Agentic PR Review

# Runs automatically on:
#  - PR opened (including drafts)
#  - PR marked ready for review (draft -> ready)
#  - `agentic-review` label (re-)applied for a manual rerun
#  - PR comment containing @nitro-pr-review
#
# Never runs when the PR carries the `agentic-review-opt-out` label.
on:
  pull_request:
    types: [opened, ready_for_review, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  agentic-review:
    name: PR Review
    if: |
      !contains(github.event.pull_request.labels.*.name, 'agentic-review-opt-out') &&
      !contains(github.event.issue.labels.*.name, 'agentic-review-opt-out') &&
      (
        (
          github.event_name == 'pull_request' && (
            github.event.action == 'opened' ||
            github.event.action == 'ready_for_review' ||
            (github.event.action == 'labeled' && github.event.label.name == 'agentic-review')
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@nitro-pr-review') &&
          github.event.issue_comment.author_association == 'MEMBER'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Skip ineligible PRs
        id: skip_gate
        if: |
          (github.event.pull_request.state || github.event.issue.state) != 'open'
        run: |
          echo "skip=true" >> "${GITHUB_OUTPUT}"
          echo "Skipping agentic review because the PR is not open"

      - name: Review PR
        timeout-minutes: 15
        if: steps.skip_gate.outputs.skip != 'true'
        uses: powerhome/github-actions-workflows/agentic-pr-review@cbcd3136be871ebab1c0f3dcb32fdc178fbac50b # main
        with:
          app-id: ${{ secrets.AGENTIC_REVIEW_GITHUB_APP_ID }}
          private-key: ${{ secrets.AGENTIC_REVIEW_GITHUB_APP_PRIVATE_KEY }}
          provider-api-key: ${{ secrets.AGENTIC_REVIEW_PROVIDER_API_KEY }}
          pull-request-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          # Intentionally pass the full comment through so reviewers can steer a rerun.
          additional-prompt: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
