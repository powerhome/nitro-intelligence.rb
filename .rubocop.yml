inherit_from: .rubocop_todo.yml

require:
  - rubocop-powerhome

AllCops:
  TargetRubyVersion: 3.3
  Exclude:
    - '.console_setup.rb'

Layout/LineLength:
  Exclude:
    - '../**/spec/**/*_spec.rb'

Performance/ChainArrayAllocation:
  Enabled: false

Rails:
  Enabled: false

Style/FrozenStringLiteralComment:
  EnforcedStyle: never
